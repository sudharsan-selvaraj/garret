<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font: 12.5px -apple-system, sans-serif; color: #e6e6ea; background: #1c1c1e; height: 100vh; display: flex; flex-direction: column; padding: 10px; gap: 8px; }
      form { display: flex; gap: 6px; }
      textarea { flex: 1; resize: none; height: 44px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; padding: 6px 9px; color: inherit; font: inherit; }
      button { background: #0a84ff; color: #fff; border: none; border-radius: 6px; padding: 0 12px; cursor: pointer; }
      ul { list-style: none; margin: 0; padding: 0; overflow: auto; flex: 1; }
      li { display: flex; gap: 8px; align-items: flex-start; padding: 7px 0; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
      li span { flex: 1; white-space: pre-wrap; }
      li button { background: transparent; color: rgba(235,235,245,0.4); padding: 0 4px; }
      .err { color: #ff8a80; }
    </style>
  </head>
  <body>
    <form id="f">
      <textarea id="t" placeholder="Jot a note… (⌘⏎ to add)" spellcheck="false"></textarea>
      <button type="submit">Add</button>
    </form>
    <ul id="list"></ul>

    <script>
      const g = window.garret && window.garret.native
      const $list = document.getElementById('list')
      const $t = document.getElementById('t')

      function render(notes) {
        $list.innerHTML = ''
        for (const n of notes) {
          const li = document.createElement('li')
          const span = document.createElement('span')
          span.textContent = n.text
          const del = document.createElement('button')
          del.textContent = '✕'
          del.onclick = async () => render((await g.request('remove', { id: n.id })).notes)
          li.append(span, del)
          $list.appendChild(li)
        }
      }

      document.getElementById('f').onsubmit = async (e) => {
        e.preventDefault()
        if (!$t.value.trim()) return
        try {
          render((await g.request('add', { text: $t.value })).notes)
          $t.value = ''
        } catch (err) {
          $list.innerHTML = `<li class="err">${err.message || err}</li>`
        }
      }
      $t.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) document.getElementById('f').requestSubmit()
      })

      if (g) g.request('all').then((r) => render(r.notes))
      else $list.innerHTML = '<li class="err">no native bridge</li>'
    </script>
  </body>
</html>
