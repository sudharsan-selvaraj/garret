<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        font: 13px -apple-system, sans-serif;
        color: #e6e6ea;
        background: #1c1c1e;
        padding: 12px 14px;
      }
      h3 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 4px 0;
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
      }
      .k {
        color: rgba(235, 235, 245, 0.6);
      }
      .v {
        font-variant-numeric: tabular-nums;
      }
      .err {
        color: #ff453a;
      }
      .tick {
        margin-top: 8px;
        color: rgba(235, 235, 245, 0.4);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h3>👋 Hello (native)</h3>
    <div id="out">Loading…</div>
    <div class="tick" id="tick"></div>
    <script>
      const out = document.getElementById('out')
      const tick = document.getElementById('tick')
      const g = window.garret && window.garret.native
      if (!g) {
        out.innerHTML = '<span class="err">no native bridge — not running in Garret</span>'
      } else {
        g.request('info')
          .then((info) => {
            out.innerHTML = Object.entries(info)
              .map(([k, v]) => `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`)
              .join('')
          })
          .catch((e) => {
            out.innerHTML = `<span class="err">${e && e.message ? e.message : e}</span>`
          })
        g.onEvent((channel, payload) => {
          if (channel === 'tick') tick.textContent = 'tick @ ' + new Date(payload.at).toLocaleTimeString()
        })
      }
    </script>
  </body>
</html>
