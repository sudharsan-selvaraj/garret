<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font: 13px/1.4 -apple-system, system-ui, sans-serif; color: #e6e6ea; }
      .wrap { padding: 12px 14px; }
      header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
      .title { font-weight: 600; }
      button { font: inherit; color: #e6e6ea; background: #ffffff1a; border: 0; border-radius: 6px; padding: 4px 10px; }
      button:disabled { opacity: 0.5; }
      .msg { opacity: 0.7; }
      .msg.err { color: #ff8a8a; }
      .list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
      .row { display: grid; grid-template-columns: 10px 1fr auto; align-items: center; gap: 8px; }
      .name { font-weight: 500; }
      .serial { grid-column: 2; font-size: 11px; opacity: 0.55; }
      .state { font-size: 11px; opacity: 0.7; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; grid-row: span 2; }
      .dot.device { background: #48d16a; }
      .dot.unauthorized { background: #e6b23a; }
      .dot.offline { background: #ff6b6b; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
