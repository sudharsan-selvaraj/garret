<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #root { height: 100%; }
      /* The host window (SurfaceWindowRoot) draws the draggable titlebar; the guest fills the rest
         with the device screen. */
      .screen-wrap { position: relative; height: 100%; display: flex; align-items: center; justify-content: center; }
      .screen { width: 100%; height: 100%; display: block; object-fit: contain; }
      .msg { position: absolute; font: 12px -apple-system, system-ui, sans-serif; color: #e6e6ea; opacity: 0.75; }
      .msg.err { color: #ff8a8a; padding: 0 16px; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
