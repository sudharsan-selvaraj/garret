<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font: 12.5px -apple-system, sans-serif; color: #e6e6ea; background: #1c1c1e; height: 100vh; padding: 12px; overflow: auto; }
      h3 { margin: 0 0 10px; font-size: 13px; }
      .stat { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
      .k { color: rgba(235,235,245,0.55); }
      .v { font-variant-numeric: tabular-nums; }
      button { margin-top: 12px; background: rgba(255,255,255,0.1); color: inherit; border: none; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
      table { width: 100%; margin-top: 10px; border-collapse: collapse; font: 11px ui-monospace, monospace; }
      td { padding: 2px 4px; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
    </style>
  </head>
  <body>
    <h3>System Monitor</h3>
    <div id="stats"><div class="stat"><span class="k">status</span><span class="v">starting…</span></div></div>
    <button id="ps">Top processes</button>
    <table id="top"></table>

    <script>
      const g = window.garret && window.garret.native
      const $stats = document.getElementById('stats')
      const gb = (n) => (n / 1073741824).toFixed(2) + ' GB'

      g &&
        g.onEvent((channel, p) => {
          if (channel !== 'stats') return
          const usedPct = (((p.memTotal - p.memFree) / p.memTotal) * 100).toFixed(0)
          $stats.innerHTML =
            row('load (1m)', p.load[0].toFixed(2)) +
            row('cpus', p.cpus) +
            row('mem used', `${usedPct}%  (${gb(p.memTotal - p.memFree)} / ${gb(p.memTotal)})`)
        })
      const row = (k, v) => `<div class="stat"><span class="k">${k}</span><span class="v">${v}</span></div>`

      document.getElementById('ps').onclick = async () => {
        const { rows } = await g.request('topProcesses')
        document.getElementById('top').innerHTML = rows
          .map((r) => `<tr><td>${r.pid}</td><td>${r.cpu}%</td><td>${r.comm}</td></tr>`)
          .join('')
      }

      // The UI owns the poll lifecycle by hand. And there's no unmount hook here to stop() on close.
      if (g) g.request('start', { intervalMs: 2000 })
      else $stats.innerHTML = row('error', 'no native bridge')
    </script>
  </body>
</html>
