appId: com.sudharsanselvaraj.garret
productName: Garret
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - native/build/Release/*.node
  - package.json
# Native addon can't run from inside the asar — keep it unpacked.
asarUnpack:
  - native/build/**
# We build the native addon ourselves (build:native); don't let electron-builder rebuild.
npmRebuild: false
# Register the .garret widget package so a double-click / "Open With" routes to the app
# (handled via the main-process 'open-file' event → install consent flow).
fileAssociations:
  - ext: garret
    name: Garret Widget
    role: Viewer
    rank: Owner
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  darkModeSupport: true
  # Menu-bar agent: no Dock icon / app-switcher entry (matches app.dock.hide()).
  extendInfo:
    LSUIElement: 1
  # Unsigned local build — set a real identity + notarize for distribution later.
  identity: null
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
dmg:
  title: Garret
