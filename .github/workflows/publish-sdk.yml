name: Publish SDK

# Publish the widget SDK packages to npm. Cut a release by pushing a tag like
# `sdk-v0.1.0` (separate from the app's `v*` tags), or run manually.
#
# Prerequisites (one-time):
#   - Add an npm automation token as the `NPM_TOKEN` repo secret.
#   - The package names (garret-core, garret-widget-sdk) are claimed on first publish.
on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance (ties the published package to this repo + commit)

jobs:
  publish:
    runs-on: ubuntu-latest # pure TS packages — no native/electron build needed
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install (skip electron postinstall — not needed to build the packages)
        run: npm ci --ignore-scripts

      - name: Sync package versions to the tag
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version \
            -w garret-core -w garret-widget-sdk

      - name: Build packages
        run: npm run build:packages

      - name: Publish garret-core
        run: npm publish -w garret-core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish garret-widget-sdk
        run: npm publish -w garret-widget-sdk --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
