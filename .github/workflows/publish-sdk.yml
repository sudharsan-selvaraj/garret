name: Publish SDK

# Publish @garretapp/sdk to npm. Cut a release by pushing a tag like `sdk-v0.2.0`
# (separate from the app's `v*` tags), or run manually.
#
# Prerequisite (one-time): add an npm automation token as the `NPM_TOKEN` repo secret.
on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance (ties the published package to this repo + commit)

jobs:
  publish:
    runs-on: ubuntu-latest # pure TS package — no native/electron build needed
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install (skip electron postinstall — not needed to build the SDK)
        run: npm ci --ignore-scripts

      - name: Sync version to the tag
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version -w @garretapp/sdk

      - name: Build SDK
        run: npm run build -w @garretapp/sdk

      - name: Publish @garretapp/sdk
        run: npm publish -w @garretapp/sdk --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
