<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      /* Board embeds widgets in a white webview → paint our own native dark card (see the design
         tokens in the app). No inline script (strict CSP: script-src 'self'). */
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 6px; background: #1c1c1e; color: rgba(255, 255, 255, 0.92);
        font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        user-select: none; -webkit-user-select: none;
      }
      #time { font-size: 40px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
      #date { font-size: 13px; color: rgba(235, 235, 245, 0.6); }
    </style>
  </head>
  <body>
    <div id="time">--:--</div>
    <div id="date"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
