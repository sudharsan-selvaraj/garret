<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #1c1c1e; color: rgba(255, 255, 255, 0.92);
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        user-select: none; -webkit-user-select: none;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      }
      #time { font-size: 44px; font-weight: 600; font-variant-numeric: tabular-nums; }
      #time.done { color: #ff453a; }
      .presets { display: flex; gap: 6px; }
      .row { display: flex; gap: 8px; }
      button {
        font: inherit; font-size: 12px; color: rgba(255, 255, 255, 0.92);
        background: rgba(255, 255, 255, 0.1); border: 0; border-radius: 8px; padding: 6px 12px; cursor: pointer;
      }
      button:hover { background: rgba(255, 255, 255, 0.16); }
      button.primary { background: #0a84ff; color: #fff; }
      button.primary:hover { background: #339cff; }
    </style>
  </head>
  <body>
    <div class="presets">
      <button data-min="1">1m</button>
      <button data-min="5">5m</button>
      <button data-min="10">10m</button>
      <button data-min="25">25m</button>
    </div>
    <div id="time">00:00</div>
    <div class="row">
      <button id="startpause" class="primary">Start</button>
      <button id="reset">Reset</button>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
